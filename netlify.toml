# Netlify configuration for SupportKit Universal Links

# Serve the apple-app-site-association file with the correct Content-Type.
# Apple requires application/json — without this header iOS will reject the file.
# Both paths are served directly from their respective files (no redirects).
# Apple's CDN fetches AASA on app install; any redirect — even a 200 rewrite —
# can cause iOS to silently discard the association.
[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"

[[headers]]
  for = "/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"

# Rewrite /tool/* paths to the landing page so Safari shows a proper page
# instead of a 404 when Universal Links fall through to the browser.
[[redirects]]
  from = "/tool/*"
  to = "/"
  status = 200
